<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#090c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>오준영 전용 스케줄 메모</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.png" />
  <link rel="apple-touch-icon" href="./icon.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <h1>오준영 전용 스케줄 메모</h1>

    <section class="card add-card">
      <label for="dateInput">날짜 설정</label>
      <div class="date-shell">
        <span class="cal left"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3.5" y="5" width="17" height="15.5" rx="2.5" stroke="currentColor" stroke-width="2"/>
  <path d="M7.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M16.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M4 10H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg></span>
        <input id="dateInput" type="date" />
        <span class="cal right"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3.5" y="5" width="17" height="15.5" rx="2.5" stroke="currentColor" stroke-width="2"/>
  <path d="M7.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M16.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M4 10H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg></span>
      </div>

      <label for="memoInput">일정 메모</label>
      <textarea id="memoInput" placeholder="일정을 입력하세요"></textarea>

      <div class="sub-row">
        <button id="hourBtn" class="sub-btn" type="button">◷ 근무시간 추가</button>
        <button id="payBtn" class="sub-btn" type="button">₩ 일당 추가</button>
      </div>

      <button id="addBtn" class="main-btn" type="button">일정 추가</button>
    </section>

    <section class="list-top">
      <h2>일정 목록</h2>
      <div class="month-nav">
        <button id="prevBtn" type="button">‹</button>
        <div class="month-shell">
          <span class="month-cal"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3.5" y="5" width="17" height="15.5" rx="2.5" stroke="currentColor" stroke-width="2"/>
  <path d="M7.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M16.5 3.5V7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M4 10H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg></span>
          <input id="monthInput" type="month" />
        </div>
        <button id="nextBtn" type="button">›</button>
      </div>
    </section>

    <section id="scheduleList" class="schedule-list"></section>

    <section class="card summary-card">
      <h2 id="summaryTitle">월별 합계</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <span>◷ 총 근무시간</span>
          <strong id="totalHours">0시간</strong>
        </div>
        <div class="summary-item">
          <span>₩ 총 급여</span>
          <strong id="totalPay">0원</strong>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./app.js"></script>
</body>
</html>
